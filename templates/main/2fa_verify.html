<!DOCTYPE html>
<html lang="th" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยัน 2FA - NT Package Internet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
        
        /* NT Corporate Colors */
        .nt-orange { background-color: #ffc800; }
        .nt-blue { background-color: #003b7a; }
        .nt-light-blue { background-color: #4a90e2; }
        .nt-gray { background-color: #f5f5f5; }
        
        .text-nt-orange { color: #ffc800; }
        .text-nt-blue { color: #003b7a; }
        .text-nt-light-blue { color: #4a90e2; }
        
        .border-nt-orange { border-color: #ffc800; }
        .border-nt-blue { border-color: #003b7a; }
        
        .gradient-nt {
            background: linear-gradient(135deg, #003b7a 0%, #4a90e2 50%, #ffc800 100%);
        }
        
        .hero-pattern {
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(74, 144, 226, 0.1) 0%, transparent 50%);
        }
        
        .promotion-card {
            transition: all 0.3s ease;
            border-left: 4px solid #ffc800;
        }
        
        .promotion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 59, 122, 0.15);
            border-left-color: #003b7a;
        }
        
        .service-icon {
            background: linear-gradient(45deg, #ffc800, #4a90e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Chat Widget Styles (if needed, though this page doesn't have it) */
        .chat-toggle-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1001;
            background: linear-gradient(135deg, #ffc800, #003b7a);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            transition: all 0.3s ease;
        }
        
        .chat-toggle-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
        }
        
        .chat-toggle-button.hidden-button {
            opacity: 0;
            visibility: hidden;
        }

        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            z-index: 1000;
            width: 380px;
            height: 520px;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 59, 122, 0.15);
            border: 2px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(calc(100% + 20px));
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-out;
        }
        
        .chat-window.open {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #003b7a, #4a90e2);
            color: white;
            padding: 1.25rem;
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-messages {
            flex-grow: 1;
            padding: 1.25rem;
            overflow-y: auto;
            background-color: #fafafa;
        }
        
        .chat-input-area {
            padding: 1.25rem;
            background-color: white;
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
            display: flex;
            align-items: center;
            border-top: 1px solid #e5e5e5;
        }
        
        .chat-message-user {
            background: linear-gradient(135deg, #ffc800, #ff8c61);
            color: white;
            padding: 0.875rem 1rem;
            border-radius: 18px 18px 4px 18px;
            margin-left: auto;
            max-width: 80%;
            box-shadow: 0 2px 8px rgba(255, 107, 53, 0.2);
        }
        
        .chat-message-bot {
            background-color: white;
            color: #333;
            padding: 0.875rem 1rem;
            border-radius: 18px 18px 18px 4px;
            margin-right: auto;
            max-width: 80%;
            border: 1px solid #e5e5e5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .chat-message-wrapper {
            display: flex;
            margin-bottom: 1rem;
        }
        
        .chat-message-wrapper.user {
            justify-content: flex-end;
        }
        
        .chat-message-wrapper.bot {
            justify-content: flex-start;
        }
        
        /* Custom scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        @keyframes fade-in-right {
            from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fade-out-right {
            from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100%); }
        }
        .animate-fade-in-right { animation: fade-in-right 0.5s ease-out forwards; }
        .animate-fade-out-right { animation: fade-out-right 0.5s ease-in forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-300 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 space-y-8 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl relative">
        <div class="absolute top-4 right-4">
            <button id="theme-toggle" type="button" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg text-sm p-2.5">
                <i id="theme-toggle-dark-icon" class="fas fa-moon hidden"></i>
                <i id="theme-toggle-light-icon" class="fas fa-sun"></i>
            </button>
        </div>
        <a href="/login" class="absolute top-4 left-4 text-gray-400 hover:text-nt-blue transition-colors" aria-label="Back to login">
            <i class="fas fa-arrow-left fa-lg"></i>
        </a>
        
        <div id="alert-container" class="hidden fixed top-5 right-5 z-50"></div>

        <div class="text-center">
            <h1 class="text-3xl font-bold text-nt-blue dark:text-white">ยืนยันตัวตน 2 ชั้น</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">ป้อนรหัส 6 หลักจากแอป Authenticator ของคุณ</p>
        </div>
        
        {% if error %}
        <div id="initial-error-alert" class="flex items-center p-4 mb-4 text-white bg-red-500 rounded-lg shadow-lg">
            <i class="fas fa-exclamation-circle mr-3"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/2fa/verify" method="post" class="space-y-6">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="relative">
                <input type="text" id="otp" name="otp" required pattern="\d{6}" title="ป้อนรหัส 6 หลัก"
                       class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-800 dark:text-gray-200 placeholder-gray-500 dark:placeholder-gray-400 text-center text-2xl tracking-[1em] focus:outline-none focus:ring-2 focus:ring-nt-orange peer">
                <label for="otp"
                       class="absolute left-4 -top-3.5 text-gray-400 dark:text-gray-500 text-sm transition-all 
                              peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3.5 
                              peer-focus:-top-3.5 peer-focus:text-nt-orange peer-focus:text-sm">
                    รหัสยืนยัน
                </label>
            </div>
            <div>
                <button type="submit"
                        class="w-full px-4 py-3 font-semibold text-white nt-orange rounded-lg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-50 focus:ring-nt-orange transition-all duration-300 ease-in-out">
                    ยืนยัน
                </button>
            </div>
        </form>
    </div>

    <script>
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alert-container');
            
            const alertColors = {
                success: { bg: 'bg-green-500', icon: 'fa-check-circle' },
                error: { bg: 'bg-red-500', icon: 'fa-exclamation-circle' },
                warning: { bg: 'bg-yellow-500', icon: 'fa-exclamation-triangle' },
                info: { bg: 'bg-blue-500', icon: 'fa-info-circle' }
            };

            const alertDiv = document.createElement('div');
            alertDiv.className = `flex items-center p-4 mb-4 text-white ${alertColors[type].bg} rounded-lg shadow-lg animate-fade-in-right`;
            alertDiv.innerHTML = `<i class="fas ${alertColors[type].icon} mr-3"></i><span>${message}</span>`;
            
            alertContainer.appendChild(alertDiv);
            alertContainer.classList.remove('hidden');

            setTimeout(() => {
                alertDiv.classList.add('animate-fade-out-right');
                setTimeout(() => {
                    alertDiv.remove();
                    if (alertContainer.childElementCount === 0) {
                        alertContainer.classList.add('hidden');
                    }
                }, 500);
            }, 5000);
        }

        const initialError = document.getElementById('initial-error-alert');
        if (initialError) {
            setTimeout(() => {
                initialError.style.display = 'none';
            }, 5000);
        }

        // --- Theme Toggle ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Change the icons inside the button based on previous settings
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
            themeToggleDarkIcon.classList.add('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
            themeToggleLightIcon.classList.add('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {

            // toggle icons inside button
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // if set via local storage previously
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }

            // if NOT set via local storage previously
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
