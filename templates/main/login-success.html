<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบสำเร็จ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="/static/css/theme.css">
    <script src="/static/js/theme-switcher.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="refresh" content="3;url=/chat">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
        /* NT Corporate Colors */
        .nt-orange { background-color: #ffc800; }
        .nt-blue { background-color: #003b7a; }
        .text-nt-orange { color: #ffc800; }
        .text-nt-blue { color: #003b7a; }
        .gradient-nt-bg {
            background: linear-gradient(135deg, #003b7a 0%, #4a90e2 50%, #ffc800 100%);
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeInScale {
            animation: fadeInScale 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex items-center justify-center min-h-screen relative overflow-hidden dark:bg-gray-900 dark:text-gray-300">
    <canvas id="particle-canvas" class="absolute top-0 left-0 w-full h-full z-0"></canvas>
    <div class="text-center p-12 bg-white rounded-3xl shadow-2xl border border-gray-100 animate-fadeInScale relative z-10 dark:bg-gray-800 dark:border-gray-700">
        <svg class="w-20 h-20 mx-auto text-nt-orange mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h1 class="text-4xl font-bold text-nt-blue mt-4 mb-3 dark:text-white">เข้าสู่ระบบสำเร็จ!</h1>
        <p class="text-lg text-gray-700 mb-6 dark:text-gray-300">กำลังนำคุณไปยังหน้าแชทอัตโนมัติ...</p>
        <a href="/chat" class="inline-block px-8 py-3 text-lg font-semibold text-white nt-orange rounded-full hover:opacity-90 transition-all transform hover:scale-105 shadow-lg">
            ไปที่หน้าแชททันที <i class="fas fa-arrow-right ml-2"></i>
        </a>
    </div>
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        const mouse = {
            x: null,
            y: null,
            radius: (canvas.height/100) * (canvas.width/100)
        }

        window.addEventListener('mousemove', 
            function(event) {
                let rect = canvas.getBoundingClientRect();
                mouse.x = event.clientX - rect.left;
                mouse.y = event.clientY - rect.top;
            }
        );

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius + this.size){
                    if(mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 5;
                    }
                    if(mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 5;
                    }
                    if(mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 5;
                    }
                    if(mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 5;
                    }
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            let colors = document.documentElement.classList.contains('dark') 
                ? ['#4a90e2', '#ffc800', '#f5f5f5'] 
                : ['#003b7a', '#4a90e2', '#ffc800'];
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((canvas.width - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((canvas.height - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * .4) - 0.2;
                let directionY = (Math.random() * .4) - 0.2;
                let color = colors[Math.floor(Math.random() * colors.length)];

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect(){
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));

                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        let strokeStyle = document.documentElement.classList.contains('dark') ? 'rgba(74,144,226,' + opacityValue + ')' : 'rgba(0,59,122,' + opacityValue + ')';
                        ctx.strokeStyle = strokeStyle;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0,0,canvas.width, canvas.height);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        window.addEventListener('resize', 
            function(){
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                mouse.radius = (canvas.height/100) * (canvas.width/100);
                init();
            }
        )

        window.addEventListener('mouseout', 
            function(){
                mouse.x = undefined;
                mouse.y = undefined;
            }
        )

        init();
        animate();
    </script>
</body>
</html>
